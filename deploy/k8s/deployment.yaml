apiVersion: apps/v1
kind: Deployment
metadata:
  name: lurus-www
  namespace: lurus-www
  labels:
    app: lurus-www
    app.kubernetes.io/name: lurus-www
    app.kubernetes.io/part-of: lurus
    app.kubernetes.io/component: web
spec:
  replicas: 1
  # RollingUpdate(maxUnavailable=0, maxSurge=1): the new pod must reach Ready
  # before the old one is terminated, giving zero-downtime deploys (and making a
  # slow image pull non-fatal — the old pod keeps serving until the new is up).
  # Requires 2-pod headroom in the lurus-www ResourceQuota: raised in lurus-deploy
  # cluster/quotas/lurus-www.yaml (req.mem 512Mi / lim.mem 1Gi / lim.cpu 2).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: lurus-www
      app.kubernetes.io/name: lurus-www
      app.kubernetes.io/part-of: lurus
  template:
    metadata:
      labels:
        app: lurus-www
        app.kubernetes.io/name: lurus-www
        app.kubernetes.io/part-of: lurus
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      # must exceed the preStop sleep (10s) so the drain finishes before SIGKILL
      terminationGracePeriodSeconds: 30
      containers:
        - name: www
          image: ghcr.io/hanmahong5-arch/2c-bs-www-next:main-8db1983
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          # preStop drain: SIGTERM removes the pod from Service endpoints
          # asynchronously, so for a beat Traefik still routes to a terminating
          # pod (→ 502/reset). Sleeping before the app exits keeps it serving
          # until de-registration propagates, closing the last rollout gap.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "10"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      # ICP requirement: www.lurus.cn must be served from Aliyun node
      nodeSelector:
        lurus.cn/role: www-gateway
      tolerations:
        - key: lurus.cn/www-only
          value: "true"
          effect: NoSchedule
        - key: svclb-exclude
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      volumes:
        - name: tmp
          emptyDir: {}
