apiVersion: apps/v1
kind: Deployment
metadata:
  name: lurus-www
  namespace: lurus-www
  labels:
    app: lurus-www
    app.kubernetes.io/name: lurus-www
    app.kubernetes.io/part-of: lurus
    app.kubernetes.io/component: web
spec:
  replicas: 1
  # Recreate strategy: avoids ResourceQuota exceeded during rolling update
  # (quota allows only 1 pod's worth of resources)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lurus-www
      app.kubernetes.io/name: lurus-www
      app.kubernetes.io/part-of: lurus
  template:
    metadata:
      labels:
        app: lurus-www
        app.kubernetes.io/name: lurus-www
        app.kubernetes.io/part-of: lurus
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: www
          image: ghcr.io/hanmahong5-arch/2c-bs-www-next:main-f42fc58
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      # ICP requirement: www.lurus.cn must be served from Aliyun node
      nodeSelector:
        lurus.cn/role: www-gateway
      tolerations:
        - key: lurus.cn/www-only
          value: "true"
          effect: NoSchedule
        - key: svclb-exclude
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      volumes:
        - name: tmp
          emptyDir: {}
